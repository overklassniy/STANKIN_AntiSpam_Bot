services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stankin-antispam
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "12523:12523"
    restart: unless-stopped