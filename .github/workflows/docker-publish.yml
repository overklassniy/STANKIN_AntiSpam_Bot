name: Docker — сборка и публикация образов

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      variant:
        description: Какой Dockerfile собирать
        required: true
        default: all
        type: choice
        options:
          - all
          - onnx
          - torch-cpu
          - torch-cuda

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/stankin_antispam_bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            variant: onnx
            suffix: ""
            auto: true
          - dockerfile: Dockerfile.torch-cpu
            variant: torch-cpu
            suffix: -torch-cpu
            auto: false
          - dockerfile: Dockerfile.torch-cuda
            variant: torch-cuda
            suffix: -torch-cuda
            auto: false

    steps:
      - name: Проверка необходимости сборки
        id: gate
        # Автоматически (push/PR) собирается только основной образ (onnx).
        # torch-cpu и torch-cuda — только при ручном запуске workflow_dispatch.
        if: |
          (github.event_name != 'workflow_dispatch' && matrix.auto) ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant))
        run: echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Получение исходного кода
        if: steps.gate.outputs.should_run
        uses: actions/checkout@v6

      - name: Настройка Docker Buildx
        if: steps.gate.outputs.should_run
        uses: docker/setup-buildx-action@v4

      - name: Авторизация в GHCR
        if: steps.gate.outputs.should_run && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Извлечение метаданных
        if: steps.gate.outputs.should_run
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest${{ matrix.suffix }},enable={{is_default_branch}}
          labels: |
            variant=${{ matrix.variant }}

      - name: Сборка и публикация образа
        if: steps.gate.outputs.should_run
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}