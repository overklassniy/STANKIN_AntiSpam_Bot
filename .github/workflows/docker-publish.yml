name: Docker — сборка и публикация образов

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: Какой Dockerfile собирать
        required: true
        default: all
        type: choice
        options:
          - all
          - onnx
          - torch-cpu
          - torch-cuda

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/stankin_antispam_bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            variant: onnx
            suffix: ""
            auto: true
          - dockerfile: Dockerfile.torch-cpu
            variant: torch-cpu
            suffix: -torch-cpu
            auto: false
          - dockerfile: Dockerfile.torch-cuda
            variant: torch-cuda
            suffix: -torch-cuda
            auto: false

    # Автоматически (push/PR/тег) собирается только основной образ (onnx).
    # torch-cpu и torch-cuda собираются только при ручном запуске workflow_dispatch.
    if: |
      (github.event_name != 'workflow_dispatch' && matrix.auto) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant))
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest${{ matrix.suffix }},enable={{is_default_branch}}
          labels: |
            variant=${{ matrix.variant }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}